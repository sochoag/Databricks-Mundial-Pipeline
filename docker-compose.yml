version: "3.9"

x-airflow-common: &airflow-common
  image: apache/airflow:2.9.3-python3.11
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres:5432/airflow
    AIRFLOW__CORE__FERNET_KEY: "46BKJoQYlPPOexq0OhDZnIlNepKFf87WFwLt0nfdstY="
    AIRFLOW__WEBSERVER__SECRET_KEY: "mundial-secret-key"
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AWS_ACCESS_KEY_ID: test
    AWS_SECRET_ACCESS_KEY: test
    AWS_DEFAULT_REGION: us-east-1
    LOCALSTACK_ENDPOINT: http://localstack:4566
    FOOTBALL_API_KEY: ${FOOTBALL_API_KEY}
    FOOTBALL_API_BASE_URL: https://api.football-data.org/v4
    S3_RAW_BUCKET: mundial-raw
    S3_CURATED_BUCKET: mundial-curated
    S3_ANALYTICS_BUCKET: mundial-analytics
    DATABRICKS_HOST: ${DATABRICKS_HOST}
    DATABRICKS_TOKEN: ${DATABRICKS_TOKEN}
  volumes:
    - ./airflow/dags:/opt/airflow/dags
    - ./airflow/plugins:/opt/airflow/plugins
    - ./airflow/logs:/opt/airflow/logs
  depends_on:
    postgres:
      condition: service_healthy

services:
  # ─── Infrastructure ──────────────────────────────────────────
  localstack:
    image: localstack/localstack:3.5
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,iam,sts
      DEBUG: 0
      DATA_DIR: /tmp/localstack/data
    volumes:
      - ./.localstack:/tmp/localstack
      - ./infra/localstack/init.sh:/etc/localstack/init/ready.d/init.sh
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Airflow ─────────────────────────────────────────────────
  airflow-init:
    <<: *airflow-common
    command: >
      bash -c "airflow db migrate &&
               airflow users create --username admin --password admin
               --firstname Admin --lastname User --role Admin
               --email admin@mundial.dev"
    restart: "no"

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully

  # ─── API ─────────────────────────────────────────────────────
  api:
    build: ./api
    ports:
      - "8000:8000"
    environment:
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_DEFAULT_REGION: us-east-1
      LOCALSTACK_ENDPOINT: http://localstack:4566
      S3_ANALYTICS_BUCKET: mundial-analytics
    depends_on:
      localstack:
        condition: service_healthy
    volumes:
      - ./api:/app

  # ─── Frontend ────────────────────────────────────────────────
  frontend:
    image: node:24-alpine
    working_dir: /app
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:
